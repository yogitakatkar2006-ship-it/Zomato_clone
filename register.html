<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Zomato Clone</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>


                


<!-- Registration Section -->

<section class="d-flex align-items-center py-5"
style="min-height:100vh;
background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80') center/cover;">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<div class="text-center mb-4">

<h2 class="fw-bold text-danger">
Create Your Account
</h2>

<p class="text-muted">
Register to order your favorite food.
</p>

</div>

<form>

<div class="mb-3">

<label class="form-label fw-bold">
Full Name
</label>

<input type="text"
class="form-control"
placeholder="Enter Full Name">

</div>

<div class="mb-3">

<label class="form-label fw-bold">
Email Address
</label>

<input type="email"
class="form-control"
placeholder="Enter Email">

</div>

<div class="mb-3">

<label class="form-label fw-bold">
Mobile Number
</label>

<input type="tel"
class="form-control"
placeholder="Enter Mobile Number">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label fw-bold">
Password
</label>

<input type="password"
class="form-control"
placeholder="Password">

</div>

<div class="col-md-6 mb-3">

<label class="form-label fw-bold">
Confirm Password
</label>

<input type="password"
class="form-control"
placeholder="Confirm Password">

</div>

</div>

<div class="mb-3">

<label class="form-label fw-bold">
Gender
</label>

<div>

<div class="form-check form-check-inline">

<input class="form-check-input"
type="radio"
name="gender">

<label class="form-check-label">
Male
</label>

</div>

<div class="form-check form-check-inline">

<input class="form-check-input"
type="radio"
name="gender">

<label class="form-check-label">
Female
</label>

</div>

<div class="form-check form-check-inline">

<input class="form-check-input"
type="radio"
name="gender">

<label class="form-check-label">
Other
</label>

</div>

</div>

</div>

<div class="mb-3">

<label class="form-label fw-bold">
City
</label>

<select class="form-select">

<option>Select City</option>

<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
<option>Bangalore</option>
<option>Hyderabad</option>

</select>

</div>

<div class="mb-3 form-check">

<input class="form-check-input"
type="checkbox"
id="check">

<label class="form-check-label" for="check">

I agree to the Terms & Conditions

</label>

</div>

<div class="d-grid">

<button class="btn btn-danger btn-lg">

<i class="bi bi-person-plus-fill"></i>

Register

</button>

</div>

<div class="text-center mt-4">

Already have an account?

<a href="login.html"
class="text-danger text-decoration-none fw-bold">

Login

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<!-- Footer -->

<footer class="bg-dark text-white py-4">

<div class="container text-center">

<h5>🍽 Zomato Clone</h5>

<p>
Fast Delivery • Fresh Food • Best Restaurants
</p>

<div class="mb-3">

<i class="bi bi-facebook fs-4 me-3"></i>
<i class="bi bi-instagram fs-4 me-3"></i>
<i class="bi bi-twitter-x fs-4 me-3"></i>
<i class="bi bi-youtube fs-4"></i>

</div>

<p class="mb-0">
© 2026 Zomato Clone | Bootstrap 5
</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
