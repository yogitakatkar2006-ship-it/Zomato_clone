<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zomato Clone</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3" href="index.html">
            🍽 Zomato
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto">
               
        </div>

    </div>
</nav>

<!-- Login Section -->
<section class="d-flex align-items-center py-5"
style="min-height:100vh;
background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80') center/cover;">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-8">

<div class="card border-0 shadow-lg rounded-4">

<div class="card-body p-5">

<div class="text-center mb-4">

<h2 class="fw-bold text-danger">
Welcome Back
</h2>

<p class="text-muted">
Login to continue ordering your favorite food.
</p>

</div>

<form>

<!-- Email -->
<div class="mb-3">
<label class="form-label fw-semibold">
Email Address
</label>

<div class="input-group">
<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>

<input type="email"
class="form-control"
placeholder="Enter your email"
required>
</div>
</div>

<!-- Password -->
<div class="mb-3">
<label class="form-label fw-semibold">
Password
</label>

<div class="input-group">
<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input type="password"
class="form-control"
placeholder="Enter your password"
required>
</div>
</div>

<!-- Remember -->
<div class="d-flex justify-content-between align-items-center mb-4">

<div class="form-check">
<input class="form-check-input" type="checkbox" id="remember">

<label class="form-check-label" for="remember">
Remember Me
</label>
</div>

<a href="#" class="text-danger text-decoration-none">
Forgot Password?
</a>

</div>

<!-- Login Button -->
<div class="d-grid mb-3">

<a href="index.html" class="btn btn-danger btn-lg w-100">
    <i class="bi bi-box-arrow-in-right"></i>
    Login
</a>

</div>

<hr>

<!-- Social Login -->
<div class="d-grid gap-2">

<button class="btn btn-outline-danger">
<i class="bi bi-google"></i>
Continue with Google
</button>

<button class="btn btn-outline-primary">
<i class="bi bi-facebook"></i>
Continue with Facebook
</button>

</div>

<!-- Register Link -->
<div class="text-center mt-4">

Don't have an account?

<a href="register.html"
class="text-danger fw-bold text-decoration-none">
Register Now
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<!-- Footer -->
<footer class="bg-dark text-white py-4">

<div class="container text-center">

<h5>🍽 Zomato Clone</h5>

<p>
Fresh Food • Fast Delivery • Trusted Restaurants
</p>

<div class="mb-3">

<i class="bi bi-facebook fs-4 me-3"></i>
<i class="bi bi-instagram fs-4 me-3"></i>
<i class="bi bi-twitter-x fs-4 me-3"></i>
<i class="bi bi-youtube fs-4"></i>

</div>

<p class="mb-0">
© 2026 Zomato Clone | Bootstrap 5
</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
